<!--
  GiftingNetwork Email Signature - v2 Modern (FinTech/Banking style)
  ------------------------------------------------------------------
  Differences from v1:
    * Removed "Web" / "Email" word labels (modern minimalist style)
    * Tighter typography
    * Same teal divider + logo layout
  Logo URL is preset to https://www.giftingnetwork.com/GNLogo.png
  ------------------------------------------------------------------
-->
<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>GiftingNetwork Email Signature - v2 Modern</title></head>
<body style="margin:0; padding:24px; background:#ffffff; font-family: Arial, Helvetica, sans-serif;">

<!-- ===== START: copy everything between these markers ===== -->
<table cellpadding="0" cellspacing="0" border="0" style="font-family:Arial,Helvetica,sans-serif; color:#1f1f1f; line-height:1.4;">
  <tr>
    <!-- Logo -->
    <td style="vertical-align:middle; padding-right:18px;">
      <a href="https://www.giftingnetwork.com" style="text-decoration:none; border:0;">
        <img src="https://www.giftingnetwork.com/GNLogo.png" alt="GiftingNetwork" width="80"
             style="display:block; width:80px; height:auto; border:0;">
      </a>
    </td>

    <!-- Teal divider -->
    <td style="border-left:2px solid #00777B; padding:8px 0;">&nbsp;</td>

    <!-- Text block -->
    <td style="vertical-align:middle; padding-left:18px;">

      <!-- Name -->
      <div style="font-size:15px; font-weight:bold; color:#1f1f1f; letter-spacing:0.2px;">
        {{EMPLOYEE_NAME}}
      </div>

      <!-- Title -->
      <div style="font-size:11px; color:#5a5a5a; margin-top:1px;">
        {{JOB_TITLE}}
      </div>

      <!-- Company Wordmark -->
      <div style="font-size:15px; font-weight:bold; margin-top:10px;">
        <span style="color:#00777B;">Gifting</span><span style="color:#000000;">Network</span>
      </div>

      <!-- Contact lines: no word labels, direct and stacked -->
      <div style="font-size:12px; margin-top:6px; color:#1f1f1f;">
        <a href="mailto:{{EMPLOYEE_EMAIL}}" style="color:#1f1f1f; text-decoration:none;">{{EMPLOYEE_EMAIL}}</a>
      </div>
      <div style="font-size:12px; color:#1f1f1f;">
        <a href="https://www.giftingnetwork.com" style="color:#1f1f1f; text-decoration:none;">giftingnetwork.com</a>
      </div>

      <!-- Social icons (PNG, pre-colored, hosted on giftingnetwork.com) -->
      <div style="margin-top:10px;">
        <a href="{{LINKEDIN_URL}}" style="text-decoration:none; border:0; margin-right:6px;">
          <img src="https://www.giftingnetwork.com/icons/linkedin.png"
               alt="LinkedIn" width="16" height="16"
               style="display:inline-block; border:0; vertical-align:middle;">
        </a>
        <a href="https://www.facebook.com/giftingnetwork" style="text-decoration:none; border:0; margin-right:6px;">
          <img src="https://www.giftingnetwork.com/icons/facebook.png"
               alt="Facebook" width="16" height="16"
               style="display:inline-block; border:0; vertical-align:middle;">
        </a>
        <a href="https://twitter.com/giftingnetwork" style="text-decoration:none; border:0;">
          <img src="https://www.giftingnetwork.com/icons/x.png"
               alt="X" width="16" height="16"
               style="display:inline-block; border:0; vertical-align:middle;">
        </a>
      </div>

    </td>
  </tr>
</table>
<!-- ===== END: stop copying here ===== -->

</body>
</html>
